name: Build Windows Executable

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller mkb-road-kml-windows.spec

      - name: Zip the dist folder
        run: |
          Compress-Archive -Path dist\mkb-road-kml\* -DestinationPath dist\mkb-road-kml-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mkb-road-kml-windows
          path: dist\mkb-road-kml-windows.zip
          retention-days: 30

  # ── Auto-release when a v* tag is pushed ─────────────────────────────────────
  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: mkb-road-kml-windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mkb-road-kml-windows.zip
          generate_release_notes: true
