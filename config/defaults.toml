# MKB-ROAD-KML — Shipped defaults (read-only reference)
# Do not edit this file. Override values in ~/.mkb-road-kml/config.toml
# or in your project's project.toml

[app]
name = "MKB-ROAD-KML"
version = "0.1.0"
last_project = ""

[ui]
window_width = 1280
window_height = 800
theme = "light"

[logging]
level = "INFO"              # DEBUG | INFO | WARNING | ERROR
log_to_file = true
log_dir = "~/.mkb-road-kml/logs"

[simplify]
min_distance_meters = 5.0
algorithm = "rdp"
rdp_epsilon = 0.00001

[densify]
max_distance_meters = 10.0

[chainage]
interval_meters = 100
label_format = "CH {km}+{m}"
start_chainage = 0
bend_threshold_deg = 15.0

[merge]
snap_tolerance_meters = 50.0
overlap_trim_meters = 5.0

[output]
default_line_color = "ff0000ff"
default_line_width = 4
altitude_mode = "relativeToGround"
